<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Eid Al-Adha Mubarak – E Motorad</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&family=Raleway:wght@200;300;400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body {
  width: 1200px; height: 675px;
  overflow: hidden;
  background: #020b1a;
}

.scene {
  position: relative;
  width: 1200px; height: 675px;
  background: radial-gradient(ellipse at 50% 0%, #0d2a5e 0%, #030d22 55%, #010810 100%);
  overflow: hidden;
}

/* ---- AURORA GLOW ---- */
.aurora {
  position: absolute;
  top: -60px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 320px;
  background: radial-gradient(ellipse, rgba(180,130,20,0.18) 0%, rgba(10,60,120,0.12) 50%, transparent 80%);
  filter: blur(40px);
  animation: pulse 6s ease-in-out infinite alternate;
  z-index: 1;
}

/* ---- STARS ---- */
.stars {
  position: absolute; inset: 0; z-index: 2;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur, 3s) infinite alternate var(--delay, 0s);
}

/* ---- MOON ---- */
.moon {
  position: absolute;
  top: 38px; right: 160px;
  width: 72px; height: 72px;
  background: radial-gradient(circle at 38% 38%, #ffe87a, #c8941a);
  border-radius: 50%;
  box-shadow: 0 0 30px 10px rgba(212,175,55,0.45), 0 0 80px 20px rgba(212,175,55,0.15);
  z-index: 4;
  animation: moonGlow 4s ease-in-out infinite alternate;
}
.moon-crescent {
  position: absolute;
  top: 4px; left: 12px;
  width: 58px; height: 58px;
  background: #0a1e45;
  border-radius: 50%;
  z-index: 1;
}

/* ---- GROUND ---- */
.ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 130px;
  background: linear-gradient(to top, #c8901a 0%, #a87010 40%, #7a5008 70%, transparent 100%);
  z-index: 5;
}
.dune1 {
  position: absolute;
  bottom: 118px; left: -40px;
  width: 500px; height: 100px;
  background: radial-gradient(ellipse at 50% 100%, #b07818 0%, transparent 70%);
  z-index: 5;
}
.dune2 {
  position: absolute;
  bottom: 122px; right: -20px;
  width: 420px; height: 85px;
  background: radial-gradient(ellipse at 50% 100%, #9a6a10 0%, transparent 70%);
  z-index: 5;
}

/* ---- MOSQUE SILHOUETTE (pure CSS) ---- */
.mosque {
  position: absolute;
  bottom: 118px;
  left: 60px;
  z-index: 6;
  display: flex;
  align-items: flex-end;
  gap: 0px;
}

.minaret {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.minaret-top {
  width: 10px; height: 30px;
  background: #c8901a;
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
}
.minaret-crescent {
  width: 8px; height: 8px;
  border: 2px solid #f5d060;
  border-radius: 50%;
  position: relative;
  top: -34px;
  left: -1px;
  background: transparent;
}
.minaret-body {
  width: 18px;
  background: linear-gradient(to right, #a07015, #d4a020, #a07015);
}
.minaret-base {
  width: 26px; height: 14px;
  background: #b8881a;
}

.dome-group {
  display: flex;
  align-items: flex-end;
  gap: 2px;
}
.dome-main {
  width: 120px; height: 65px;
  background: linear-gradient(135deg, #c8901a 0%, #f0be30 50%, #a07010 100%);
  border-radius: 60px 60px 0 0;
  position: relative;
}
.dome-small {
  width: 55px; height: 38px;
  background: linear-gradient(135deg, #b07818 0%, #daa828 50%, #906010 100%);
  border-radius: 30px 30px 0 0;
}
.dome-tiny {
  width: 34px; height: 26px;
  background: linear-gradient(135deg, #a07015 0%, #c89820 50%, #806008 100%);
  border-radius: 20px 20px 0 0;
}
.mosque-wall {
  width: 190px; height: 68px;
  background: linear-gradient(to right, #9a6a10, #c8901a, #b07818);
  position: relative;
}
.arch {
  position: absolute;
  bottom: 0;
  width: 28px; height: 36px;
  border-radius: 14px 14px 0 0;
  background: rgba(0,5,20,0.6);
}
.arch:nth-child(1){ left: 18px; }
.arch:nth-child(2){ left: 56px; }
.arch:nth-child(3){ left: 94px; }
.arch:nth-child(4){ left: 132px; }

/* Right mini mosque */
.mosque-right {
  position: absolute;
  bottom: 118px;
  right: 80px;
  z-index: 6;
  display: flex;
  align-items: flex-end;
  gap: 1px;
  opacity: 0.7;
  transform: scaleX(-1);
}

/* ---- CAMELS ---- */
.camel-group {
  position: absolute;
  bottom: 125px;
  right: 200px;
  z-index: 7;
  display: flex;
  gap: 18px;
  align-items: flex-end;
}
.camel {
  position: relative;
}
.camel-body {
  width: 60px; height: 34px;
  background: #c88c18;
  border-radius: 40% 50% 30% 30%;
  position: relative;
}
.camel-hump {
  position: absolute;
  top: -14px; left: 18px;
  width: 28px; height: 18px;
  background: #d4981e;
  border-radius: 50% 50% 0 0;
}
.camel-head {
  position: absolute;
  top: -20px; right: -8px;
  width: 18px; height: 22px;
  background: #b87e14;
  border-radius: 40% 40% 30% 30%;
}
.camel-neck {
  position: absolute;
  top: -8px; right: 4px;
  width: 10px; height: 16px;
  background: #c08818;
  border-radius: 4px;
}
.camel-leg {
  position: absolute;
  bottom: -18px;
  width: 7px; height: 20px;
  background: #b07810;
  border-radius: 3px;
}
.leg1{ left: 8px; }
.leg2{ left: 20px; }
.leg3{ left: 34px; }
.leg4{ left: 46px; }

.camel-sm .camel-body { width: 42px; height: 24px; }
.camel-sm .camel-hump { width: 20px; height: 13px; top: -10px; left: 12px; }
.camel-sm .camel-head { width: 13px; height: 16px; top: -14px; }
.camel-sm .camel-neck { width: 7px; height: 11px; }
.camel-sm .camel-leg { height: 14px; bottom: -14px; width: 5px; }

/* ---- LANTERNS ---- */
.lantern-group {
  position: absolute;
  top: 0; right: 90px;
  z-index: 8;
  display: flex;
  gap: 28px;
}
.lantern {
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: sway var(--sw, 4s) ease-in-out infinite alternate;
  transform-origin: top center;
}
.lantern-chain {
  width: 1px;
  background: linear-gradient(to bottom, #c8a030, rgba(200,160,48,0.3));
  margin-bottom: 2px;
}
.lantern-body {
  width: 22px;
  background: linear-gradient(to bottom, #f0c830 0%, #e08010 50%, #f0c830 100%);
  border-radius: 4px;
  position: relative;
  box-shadow: 0 0 12px 5px rgba(240,180,20,0.5), 0 0 30px 10px rgba(240,160,0,0.2);
}
.lantern-cap {
  width: 28px; height: 8px;
  background: #c89020;
  border-radius: 4px 4px 0 0;
  margin-bottom: -1px;
}
.lantern-bot {
  width: 28px; height: 8px;
  background: #c89020;
  border-radius: 0 0 4px 4px;
  margin-top: -1px;
}
.lantern-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  background: #fff8d0;
  border-radius: 50%;
  box-shadow: 0 0 8px 4px rgba(255,240,160,0.8);
  animation: flicker 1.5s infinite alternate;
}

/* ---- DIVIDER LINE ---- */
.line-left, .line-right {
  position: absolute;
  top: 50%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(212,175,55,0.6), transparent);
  z-index: 9;
  animation: expandLine 1.2s 0.6s ease forwards;
  transform-origin: center;
  transform: scaleX(0);
}
.line-left { left: 30px; width: 280px; top: 47%; }
.line-right { right: 30px; width: 280px; top: 47%; transform: scaleX(0); }

/* ---- CENTER TEXT ---- */
.text-block {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  animation: fadeUp 1.1s 0.3s ease both;
}

.wishes-line {
  font-family: 'Raleway', sans-serif;
  font-weight: 200;
  font-size: 13px;
  letter-spacing: 7px;
  color: rgba(212,175,55,0.65);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.eid-word {
  font-family: 'Playfair Display', serif;
  font-size: 78px;
  font-weight: 700;
  color: #f8da6e;
  text-shadow: 0 0 40px rgba(220,170,30,0.7), 0 4px 20px rgba(0,0,0,0.8);
  line-height: 1;
  display: block;
  animation: fadeUp 1s 0.1s ease both;
}
.al-adha {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 46px;
  font-weight: 400;
  color: rgba(255,230,100,0.9);
  text-shadow: 0 0 25px rgba(200,155,20,0.5);
  display: block;
  margin-top: 4px;
  animation: fadeUp 1s 0.25s ease both;
}
.mubarak {
  font-family: 'Scheherazade New', serif;
  font-size: 62px;
  font-weight: 700;
  color: #ffe87a;
  text-shadow: 0 0 50px rgba(212,175,55,0.6), 0 3px 15px rgba(0,0,0,0.7);
  display: block;
  margin-top: 6px;
  animation: fadeUp 1s 0.4s ease both;
}

.ornament {
  color: rgba(212,175,55,0.7);
  font-size: 18px;
  letter-spacing: 12px;
  margin: 10px 0;
  display: block;
  animation: fadeUp 1s 0.6s ease both;
}

/* ---- LOGO ---- */
.logo-wrap {
  position: absolute;
  top: 22px; left: 32px;
  z-index: 20;
  background: rgba(255,255,255,0.97);
  border-radius: 10px;
  padding: 10px 20px;
  box-shadow: 0 0 0 1.5px rgba(212,175,55,0.5), 0 8px 30px rgba(0,0,0,0.6);
  animation: fadeDown 0.9s ease both;
}
.logo-wrap img { height: 50px; display: block; }

.logo-tagline {
  position: absolute;
  top: 100px; left: 32px;
  z-index: 20;
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(212,175,55,0.65);
  text-transform: uppercase;
  animation: fadeDown 0.9s 0.3s ease both;
}

/* ---- BOTTOM ---- */
.footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: linear-gradient(to top, rgba(2,8,22,0.97) 60%, transparent);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
}
.footer-text {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 4px;
  color: rgba(212,175,55,0.6);
  text-transform: uppercase;
}

/* KEYFRAMES */
@keyframes pulse {
  from { opacity: 0.6; transform: translateX(-50%) scale(1); }
  to   { opacity: 1;   transform: translateX(-50%) scale(1.08); }
}
@keyframes twinkle {
  from { opacity: 0.2; transform: scale(0.6); }
  to   { opacity: 1;   transform: scale(1.4); }
}
@keyframes moonGlow {
  from { box-shadow: 0 0 28px 8px rgba(212,175,55,0.4), 0 0 70px 18px rgba(212,175,55,0.12); }
  to   { box-shadow: 0 0 40px 16px rgba(212,175,55,0.6), 0 0 100px 30px rgba(212,175,55,0.2); }
}
@keyframes sway {
  from { transform: rotate(-4deg); }
  to   { transform: rotate(4deg); }
}
@keyframes flicker {
  from { opacity: 0.7; }
  to   { opacity: 1; }
}
@keyframes expandLine {
  to { transform: scaleX(1); }
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
